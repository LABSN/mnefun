name: 'tests'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.number }}-${{ github.event.ref }}
  cancel-in-progress: true
on:
  push:
    branches:
      - '*'
  pull_request:
    branches:
      - '*'

permissions:
  contents: read

jobs:
  # PIP-pre + non-default stim channel + log level info
  job:
    name: 'pytest'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -e {0}
    env:
      DISPLAY: ':99.0'
      MNE_LOGGING_LEVEL: 'info'
      MNE_STIM_CHANNEL: 'STI101'
      OPENBLAS_NUM_THREADS: '1'
      PYTHONUNBUFFERED: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
        name: 'Setup python'
      - run: |
          pip install --upgrade --only-binary=":all:" pip setuptools wheel
          pip install --upgrade --only-binary=":all:" -ve .
          pip install --upgrade pyyaml patsy pytest pytest-cov codecov flake8 pydocstyle numpydoc
        name: Install
      - run: make flake
      - run: pytest mnefun
      - uses: codecov/codecov-action@v6
        if: success() || failure()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
